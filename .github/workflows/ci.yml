name: CI

on:
  push:
    branches: ["main", "mvp"]
  pull_request:
    branches: ["main", "mvp"]

jobs:
  test:
    name: pytest (${{ matrix.python-version }}, ${{ matrix.extras }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        extras: ["dev"]
        include:
          - python-version: "3.11"
            extras: "all,dev"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.extras }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Show coverage (Python 3.11 core only)
        if: matrix.python-version == '3.11' && matrix.extras == 'dev'
        run: |
          pip install pytest-cov
          pytest --cov=src/jarvis --cov-report=term-missing -q

  lint:
    name: lint & security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pip-audit
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Pip audit (security)
        run: pip-audit --strict
        continue-on-error: true

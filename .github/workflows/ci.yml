name: CI

on:
  push:
    branches: ["main", "mvp"]
  pull_request:
    branches: ["main", "mvp"]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel all matrix jobs if one fails
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install core + dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install only core (lightweight) deps + test runner
          # Heavy [ai] and [browser] extras are NOT installed in CI
          # — tests mock all AI/browser calls
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Show coverage (Python 3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          pytest --cov=src/jarvis --cov-report=term-missing -q
